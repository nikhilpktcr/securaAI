<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secura AI - Alert Triage Card</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0b1020;
        --panel: #111933;
        --panel-border: #2a3b77;
        --muted: #9db0e5;
        --text: #ebf1ff;
        --accent: #6ea8fe;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: Inter, Segoe UI, Roboto, Arial, sans-serif;
        background: radial-gradient(circle at top, #1a2a55 0%, var(--bg) 45%);
        color: var(--text);
      }

      .wrap {
        max-width: 900px;
        margin: 42px auto;
        padding: 0 20px;
      }

      .panel {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 14px;
        padding: 18px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 26px;
      }

      p {
        color: var(--muted);
      }

      textarea {
        width: 100%;
        min-height: 190px;
        border-radius: 10px;
        border: 1px solid #3650a3;
        background: #0d1430;
        color: var(--text);
        padding: 12px;
        font-size: 14px;
      }

      button {
        margin-top: 12px;
        border: none;
        border-radius: 8px;
        background: var(--accent);
        color: #07122e;
        font-weight: 600;
        padding: 10px 16px;
        cursor: pointer;
      }

      .status {
        margin-top: 10px;
        color: var(--muted);
        min-height: 22px;
      }

      .result {
        margin-top: 20px;
        display: none;
      }

      .card {
        background: #0d1430;
        border: 1px solid #2b417f;
        border-radius: 12px;
        padding: 16px;
      }

      .row {
        margin-bottom: 12px;
      }

      .label {
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.1em;
        color: #93a6d7;
      }

      .value {
        margin-top: 4px;
        font-size: 15px;
      }

      .sev {
        display: inline-block;
        border-radius: 999px;
        padding: 5px 10px;
        font-weight: 700;
      }

      .sev.low {
        background: #1c3b2a;
        color: #8af0ac;
      }

      .sev.medium {
        background: #463c18;
        color: #f9d77d;
      }

      .sev.high {
        background: #4a1f26;
        color: #ff99a4;
      }

      ol {
        margin: 6px 0 0 20px;
        padding: 0;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <h1>Secura AI - Alert Triage Card</h1>
        <p>Paste one raw alert/log and generate a structured triage response.</p>
        <textarea id="alertText" placeholder="Paste suspicious alert here...">
{"timestamp":"2026-07-19T10:42:10Z","source":"SIEM","rule":"Multiple failed logins from unusual geo","user":"admin@secura.local","ip":"185.220.101.12","failed_attempts":27}
        </textarea>
        <br />
        <button id="runBtn">Generate Triage Card</button>
        <div id="status" class="status"></div>
      </div>

      <div class="result" id="resultWrap">
        <div class="card">
          <div class="row">
            <div class="label">What Happened</div>
            <div class="value" id="summary"></div>
          </div>
          <div class="row">
            <div class="label">Why It Matters</div>
            <div class="value" id="impact"></div>
          </div>
          <div class="row">
            <div class="label">Severity</div>
            <div class="value"><span id="severity" class="sev"></span></div>
          </div>
          <div class="row">
            <div class="label">Top 3 Next Actions</div>
            <ol id="actions"></ol>
          </div>
          <div class="row">
            <div class="label">Confidence</div>
            <div class="value"><span id="confidence"></span>%</div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const statusEl = document.getElementById("status");
      const resultWrap = document.getElementById("resultWrap");
      const summaryEl = document.getElementById("summary");
      const impactEl = document.getElementById("impact");
      const severityEl = document.getElementById("severity");
      const actionsEl = document.getElementById("actions");
      const confidenceEl = document.getElementById("confidence");
      const runBtn = document.getElementById("runBtn");
      const alertTextEl = document.getElementById("alertText");

      function setLoadingState(isLoading) {
        runBtn.disabled = isLoading;
        runBtn.textContent = isLoading ? "Analyzing..." : "Generate Triage Card";
      }

      function renderTriage(triage) {
        summaryEl.textContent = triage.summary || "-";
        impactEl.textContent = triage.impact || "-";
        severityEl.textContent = triage.severity || "Medium";
        severityEl.className = "sev " + String(triage.severity || "Medium").toLowerCase();
        actionsEl.innerHTML = "";

        (triage.next_actions || []).forEach((item) => {
          const li = document.createElement("li");
          li.textContent = item;
          actionsEl.appendChild(li);
        });

        confidenceEl.textContent = String(triage.confidence ?? 50);
        resultWrap.style.display = "block";
      }

      runBtn.addEventListener("click", async () => {
        const alertText = alertTextEl.value.trim();
        if (!alertText) {
          statusEl.textContent = "Please paste an alert first.";
          return;
        }

        setLoadingState(true);
        statusEl.textContent = "Running AI triage...";

        try {
          const resp = await fetch("/triage", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ alertText })
          });
          const data = await resp.json();

          if (!resp.ok) {
            throw new Error(data.error || "Unknown error from backend.");
          }

          renderTriage(data.triage);
          statusEl.textContent = "Triage complete.";
        } catch (error) {
          statusEl.textContent = "Failed: " + error.message;
        } finally {
          setLoadingState(false);
        }
      });
    </script>
  </body>
</html>
